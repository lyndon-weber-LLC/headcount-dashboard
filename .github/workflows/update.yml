      # ── 3. Run the Python script ─────────────────────────────────────────────
      # No extra pip installs needed — script uses Python stdlib only.
      - name: Generate dashboard HTML
        run: |
          # Guard: fail immediately if script is empty or corrupt
          lines=$(wc -l < update_dashboard.py)
          echo "Script size: $lines lines"
          if [ "$lines" -lt 100 ]; then
            echo "❌ ERROR: update_dashboard.py is empty or too short ($lines lines) — aborting."
            exit 1
          fi
          python -u update_dashboard.py 2>&1
          echo "Exit code: $?"
          # Verify a fresh timestamp was written to the output file
          grep -o 'Updated:.*UTC' index.html \
            || { echo "❌ ERROR: No timestamp found in index.html — dashboard may not have been written."; exit 1; }

      # ── 4. Commit updated files back to the repo ─────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html update_dashboard.py data/live/ _unknown_jobs.txt
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || (git commit -m "Dashboard auto-update $(date +'%Y-%m-%d')" && git push)
