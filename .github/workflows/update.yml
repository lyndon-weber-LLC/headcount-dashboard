name: Update Headcount Dashboard

on:
  schedule:
    # Runs Mon–Fri at 13:17 UTC = 7:17 AM MDT (UTC-6) / 6:17 AM MST (UTC-7)
    - cron: '17 13 * * 1-5'
  workflow_dispatch:   # ← also allows a manual "Run workflow" button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allows the job to commit & push back to the repo

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Check out repo
        uses: actions/checkout@v4

      # ── 2. Download fresh timesheets from Google Sheets ──────────────────────
      # Naming convention for live files:
      #   (December 31, 9999) — current pay period tab (always wins on date conflicts)
      #   (December 30, 9999) — previous pay period tab (fills gap before current period)
      # Both year-9999 dates are treated as "live" by _extract_file_date() so they
      # skip the zero-hours guard that applies to historical CSVs.
      #
      # !! PAY PERIOD ROLLOVER — UPDATE THESE GIDS !!
      # Subs:      1st–15th  /  16th–last day   → update Previous tab gids each month
      # Employees: 9th–23rd  /  24th–8th        → update Previous tab gids each cycle
      # To find a gid: open the sheet, click the tab, copy the #gid= value from the URL.
      #
      # Current sub previous tabs: Jun 16–30 (rolled over Jul 1, 2026)
      #   Alex W-S=226102445  Chad-S=1082859041  Devon-S=1541806191  Sam-S=1673392
      #   Alvin G-S: moved to overhead employee — no longer tracked as sub.
      # Next sub rollover: Jul 16 — provide Jul 1–15 tab gids at that time.
      #
      # Current employee previous tabs: Jun 24–Jul 8 (rolled over Jul 9, 2026)
